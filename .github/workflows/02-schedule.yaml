# Nome do workflow exibido na aba Actions do GitHub
name: Execução Agendada (Schedule)

# Eventos que disparam a execução da pipeline
on:

  # Executa quando houver push na branch main
  push:
    branches:
      - main

  # Executa quando houver abertura ou atualização de Pull Request para a main
  pull_request:
    branches:
      - main

  # Executa automaticamente em horários definidos
  schedule:

    # Executa diariamente às 04:44 UTC
    # Atenção:
    # 04:44 UTC = 01:44 no horário de Brasília (UTC-3)
    - cron: '44 4 * * *'

# Definição dos trabalhos (jobs) da pipeline
jobs:

  # Job responsável por validar a aplicação
  test:

    # Máquina virtual utilizada para executar o workflow
    runs-on: ubuntu-latest

    # Estratégia para executar o mesmo job em múltiplas versões do Node.js
    strategy:
      matrix:

        # Versões do Node.js que serão testadas
        node-version: [18.x, 20.x, 22.x]

    # Passos executados pelo job
    steps:

      # Faz checkout do código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # Configura o ambiente Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:

          # Utiliza a versão definida na matriz
          node-version: ${{ matrix.node-version }}

          # Habilita cache das dependências npm
          cache: 'npm'

      # Instala as dependências do projeto
      - name: Instalar dependências
        run: npm ci

      # Executa o lint apenas se existir script lint no package.json
      - name: Executar lint
        run: |
          if [ -f package.json ] && npm run | grep -q lint; then
            npm run lint || true
          else
            echo "No lint script defined, skipping"
          fi

      # Executa os testes automatizados
      - name: Executar testes
        run: npm test

      # Executa a cobertura de testes caso exista script coverage
      - name: Executar cobertura de testes
        run: |
          if npm run | grep -q coverage; then
            npm run coverage || true
          else
            echo "No coverage script defined, skipping"
          fi