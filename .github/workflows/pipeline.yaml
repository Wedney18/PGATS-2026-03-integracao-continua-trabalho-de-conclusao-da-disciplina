# Nome que aparecerá na aba Actions do GitHub
name: Pipeline Completa

# Permissões utilizadas pelos jobs da pipeline
permissions:

  # Permite leitura e escrita no repositório
  contents: write

# Eventos que disparam a execução da pipeline
on:

  # Executa quando houver push na branch main
  push:
    branches:
      - main

  # Executa quando houver abertura ou atualização de Pull Request para a main
  pull_request:
    branches:
      - main

  # Executa automaticamente em horários definidos
  schedule:

    # Executa diariamente às 04:44 UTC
    - cron: '44 4 * * *'

  # Permite executar manualmente pela interface do GitHub
  workflow_dispatch:

# Evita múltiplas execuções simultâneas para a mesma branch
concurrency:

  # Cria um grupo baseado na branch atual
  group: ci-${{ github.ref }}

  # Cancela execuções anteriores ainda em andamento
  cancel-in-progress: true

# Início da definição dos jobs
jobs:

  # Job responsável por validar a aplicação
  test:

    # Nome exibido na execução
    name: Testes Node.js

    # Máquina virtual utilizada para executar o job
    runs-on: ubuntu-latest

    # Tempo máximo de execução antes de cancelar automaticamente
    timeout-minutes: 15

    # Estratégia para executar o mesmo job em diferentes versões do Node.js
    strategy:

      # Matriz de execução
      matrix:

        # Versões do Node.js que serão testadas
        node-version: [18.x, 20.x, 22.x]

    # Passos executados pelo job
    steps:

      # Faz download do código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # Instala e configura a versão do Node especificada na matriz
      - name: Configurar Node.js
        uses: actions/setup-node@v4

        with:

          # Utiliza a versão definida na matriz
          node-version: ${{ matrix.node-version }}

          # Habilita cache das dependências npm
          cache: npm

      # Instala as dependências exatamente como estão no package-lock.json
      - name: Instalar dependências
        run: npm ci

      # Executa análise estática de código
      - name: Executar lint
        run: |
          if npm run | grep -q "lint"; then
            npm run lint
          else
            echo "Lint não configurado."
          fi

      # Executa os testes automatizados
      - name: Executar testes
        run: npm test

      # Executa a cobertura de testes caso exista script coverage
      - name: Executar cobertura de testes
        run: |
          if npm run | grep -q "coverage"; then
            npm run coverage
          else
            echo "Coverage não configurado."
          fi

      # Verifica se a aplicação compila corretamente
      - name: Build do projeto
        run: |
          if npm run | grep -q "build"; then
            npm run build
          else
            echo "Build não configurado."
          fi

      # Publica os arquivos gerados pela cobertura como artefato
      - name: Upload da cobertura

        # Executa apenas se a pasta coverage existir
        if: hashFiles('coverage/**') != ''

        # Action responsável pelo upload de artefatos
        uses: actions/upload-artifact@v4

        with:

          # Nome que aparecerá para download no GitHub
          name: coverage-report-node-${{ matrix.node-version }}

          # Pasta que contém o relatório de cobertura
          path: coverage/

  # Job responsável por gerar estatísticas de linguagens
  language-stats:

    # Nome exibido na execução
    name: Estatísticas de Linguagens

    # Sistema operacional utilizado pelo runner
    runs-on: ubuntu-latest

    # Executa apenas em execução manual ou agendada
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    # Etapas executadas pelo job
    steps:

      # Faz checkout do código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # Executa a Action responsável por analisar as linguagens do perfil
      - name: Gerar estatísticas de linguagens
        uses: StefVuck/Github-Language-Stats@v1.2.0

        with:

          # Token pessoal utilizado para acessar a API do GitHub
          # Deve estar cadastrado em Settings > Secrets and variables > Actions
          github_token: ${{ secrets.STATS_TOKEN }}

          # Tipo de visualização gerada
          # "leaderboard" cria um ranking das linguagens utilizadas
          visualization_types: "leaderboard"

          # Diretório onde os relatórios serão salvos
          output_path: "stats"

      # Salva os relatórios gerados no repositório
      - name: Commit dos relatórios
        run: |

          # Configura o usuário que realizará o commit
          git config --global user.name "github-actions[bot]"

          # Configura o e-mail do usuário que realizará o commit
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Adiciona todos os arquivos gerados na pasta stats
          git add stats/

          # Cria um commit apenas se houver alterações
          git diff --staged --quiet || git commit -m "Atualiza estatísticas de linguagens"

          # Envia as alterações para o repositório remoto
          git push
```
